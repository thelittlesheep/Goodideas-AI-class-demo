<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo API Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 20px; border: 1px solid #ddd; background: #fff; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.9rem; }
    .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }

    /* Layout */
    .panel { display: grid; grid-template-columns: 300px 1fr; gap: 20px; }
    .sidebar { display: flex; flex-direction: column; gap: 8px; }
    .main { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 20px; min-height: 500px; }

    /* Endpoint buttons */
    .ep-btn { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; text-align: left; font-size: 0.85rem; transition: background 0.15s; }
    .ep-btn:hover { background: #f0f7ff; border-color: #93c5fd; }
    .ep-btn.active { background: #eff6ff; border-color: #2563eb; }
    .method { font-weight: 700; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; min-width: 52px; text-align: center; color: #fff; }
    .method.get { background: #22c55e; }
    .method.post { background: #3b82f6; }
    .method.put { background: #f59e0b; }
    .method.delete { background: #ef4444; }

    /* Form area */
    .form-section { margin-bottom: 16px; }
    .form-section label { display: block; font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-section input, .form-section textarea, .form-section select {
      width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; font-family: inherit;
    }
    .form-section textarea { font-family: "SF Mono", Menlo, monospace; min-height: 120px; resize: vertical; }

    .send-btn { padding: 10px 28px; background: #2563eb; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .send-btn:hover { background: #1d4ed8; }

    /* Response */
    .response-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .status { font-weight: 700; padding: 2px 10px; border-radius: 4px; font-size: 0.85rem; }
    .status.ok { background: #dcfce7; color: #166534; }
    .status.err { background: #fee2e2; color: #991b1b; }
    .response-time { font-size: 0.8rem; color: #999; }
    pre.response { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 0.85rem; line-height: 1.5; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
    .empty-state { color: #aaa; font-size: 0.9rem; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demo API Explorer</h1>

    <div class="tabs">
      <div class="tab active" data-tab="users">Users</div>
      <div class="tab" data-tab="memberships">Memberships</div>
    </div>

    <div class="panel">
      <div class="sidebar" id="endpoint-list"></div>
      <div class="main">
        <div id="form-area"></div>
        <hr style="border:none;border-top:1px solid #eee;margin:16px 0">
        <div id="response-area"><div class="empty-state">Select an endpoint and send a request</div></div>
      </div>
    </div>
  </div>

<script>
const ENDPOINTS = {
  users: [
    { method: "GET",    path: "/users",          desc: "List all users" },
    { method: "GET",    path: "/users?page=1&limit=5", desc: "List users (paginated)" },
    { method: "GET",    path: "/users/:id",      desc: "Get user by ID",  params: [{ name: "id", placeholder: "1" }] },
    { method: "GET",    path: "/users/:id/role",  desc: "Get user role",  params: [{ name: "id", placeholder: "1" }] },
    { method: "POST",   path: "/users",          desc: "Create user",    body: { name: "New User", email: "new@example.com", role: "user" } },
    { method: "PUT",    path: "/users/:id",      desc: "Update user",    params: [{ name: "id", placeholder: "1" }], body: { name: "Updated Name", email: "updated@example.com", role: "admin" } },
    { method: "DELETE", path: "/users/:id",       desc: "Delete user",   params: [{ name: "id", placeholder: "1" }] },
  ],
  memberships: [
    { method: "GET",    path: "/memberships",        desc: "List all memberships" },
    { method: "GET",    path: "/memberships/:id",    desc: "Get membership by ID",  params: [{ name: "id", placeholder: "1" }] },
    { method: "POST",   path: "/memberships",        desc: "Create membership",     body: { userId: 4, plan: "basic", status: "active", startDate: "2026-01-01", endDate: "2027-01-01" } },
    { method: "PUT",    path: "/memberships/:id",    desc: "Update membership",     params: [{ name: "id", placeholder: "1" }], body: { plan: "premium", status: "active" } },
    { method: "DELETE", path: "/memberships/:id",     desc: "Delete membership",    params: [{ name: "id", placeholder: "1" }] },
  ],
};

let currentTab = "users";
let currentEp = null;

// --- Tabs ---
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentTab = tab.dataset.tab;
    currentEp = null;
    renderSidebar();
    clearForm();
  });
});

// --- Sidebar ---
function renderSidebar() {
  const list = document.getElementById("endpoint-list");
  list.innerHTML = "";
  ENDPOINTS[currentTab].forEach((ep, i) => {
    const btn = document.createElement("button");
    btn.className = "ep-btn";
    btn.innerHTML = `<span class="method ${ep.method.toLowerCase()}">${ep.method}</span><span>${ep.desc}</span>`;
    btn.addEventListener("click", () => selectEndpoint(ep, i));
    list.appendChild(btn);
  });
}

// --- Select endpoint ---
function selectEndpoint(ep, index) {
  currentEp = ep;
  document.querySelectorAll(".ep-btn").forEach((b, i) => b.classList.toggle("active", i === index));
  renderForm(ep);
}

// --- Form ---
function renderForm(ep) {
  const area = document.getElementById("form-area");
  let html = `<div style="margin-bottom:12px"><span class="method ${ep.method.toLowerCase()}">${ep.method}</span> <code style="font-size:0.95rem;margin-left:6px">${ep.path}</code></div>`;

  if (ep.params) {
    ep.params.forEach(p => {
      html += `<div class="form-section"><label>${p.name}</label><input id="param-${p.name}" type="text" placeholder="${p.placeholder}"></div>`;
    });
  }

  if (ep.body) {
    html += `<div class="form-section"><label>Request Body (JSON)</label><textarea id="req-body">${JSON.stringify(ep.body, null, 2)}</textarea></div>`;
  }

  html += `<button class="send-btn" onclick="sendRequest()">Send Request</button>`;
  area.innerHTML = html;
}

function clearForm() {
  document.getElementById("form-area").innerHTML = "";
  document.getElementById("response-area").innerHTML = `<div class="empty-state">Select an endpoint and send a request</div>`;
}

// --- Send request ---
async function sendRequest() {
  if (!currentEp) return;
  const ep = currentEp;

  let url = ep.path;
  if (ep.params) {
    ep.params.forEach(p => {
      const val = document.getElementById(`param-${p.name}`).value || p.placeholder;
      url = url.replace(`:${p.name}`, val);
    });
  }

  const opts = { method: ep.method, headers: {} };
  if (ep.body) {
    opts.headers["Content-Type"] = "application/json";
    const bodyEl = document.getElementById("req-body");
    opts.body = bodyEl ? bodyEl.value : JSON.stringify(ep.body);
  }

  const start = performance.now();
  try {
    const res = await fetch(url, opts);
    const elapsed = Math.round(performance.now() - start);
    const isOk = res.status >= 200 && res.status < 300;
    let data = "";
    const ct = res.headers.get("content-type") || "";
    if (ct.includes("json")) {
      data = JSON.stringify(await res.json(), null, 2);
    } else {
      data = await res.text();
    }
    if (res.status === 204) data = "(No Content)";

    document.getElementById("response-area").innerHTML = `
      <div class="response-header">
        <span class="status ${isOk ? "ok" : "err"}">${res.status} ${res.statusText}</span>
        <span class="response-time">${elapsed}ms</span>
      </div>
      <pre class="response">${escapeHtml(data)}</pre>`;
  } catch (e) {
    document.getElementById("response-area").innerHTML = `
      <div class="response-header"><span class="status err">Error</span></div>
      <pre class="response">${escapeHtml(e.message)}</pre>`;
  }
}

function escapeHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// Init
renderSidebar();
</script>
</body>
</html>
